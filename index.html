<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finger Tinikling</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --track-height: 240px; --note-size: 44px; --stage-scale: clamp(0.5, 2vw, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body { background: linear-gradient(135deg, #0f172a, #020617, #0f172a); color: white; font-family: 'Outfit', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        header { text-align: center; padding: 1vh 10px; z-index: 30; }
        h1 { color: #fde047; font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 900; text-shadow: 0 2px 10px rgba(253, 224, 71, 0.4); margin-bottom: 5px;}
        
        .hud { display: flex; justify-content: space-between; align-items: center; width: 95%; max-width: 900px; font-size: 1.1rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 12px; margin-top: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .score { color: #34d399; } .combo { color: #fbbf24; }
        
        .progress-container { width: 95%; max-width: 900px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: #38bdf8; transition: width 0.1s; }
        
        .game-area { flex: 1; width: 100%; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; position: relative; }
        
        .tinikling-stage { position: relative; width: 100%; max-width: 400px; height: 25vh; display: flex; justify-content: center; align-items: center; transform: scale(var(--stage-scale)); }
        .horizontal-bamboo { position: absolute; width: 120%; height: 15px; background: repeating-linear-gradient(to right, #d97706, #fcd34d 40px, #d97706 80px, #78350f 85px); border-radius: 10px; transition: transform 0.1s; box-shadow: 0 10px 20px rgba(0,0,0,0.6);}
        .bamboo-back { transform: translateY(-20px); filter: brightness(0.7); }
        .bamboo-front { transform: translateY(20px); z-index: 6;}
        .dancer-sprite { font-size: 4.5rem; position: absolute; transition: transform 0.1s; z-index: 5; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));}
        
        .track-container { position: relative; width: 95%; max-width: 1000px; height: var(--track-height); background: rgba(15, 23, 42, 0.95); border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); overflow: hidden; display: flex; flex-direction: column; margin-top: auto; margin-bottom: 1vh; box-shadow: 0 10px 40px rgba(0,0,0,0.8);}
        .lane { flex: 1; position: relative; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hit-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; transform: translateX(-50%); background: #fde047; box-shadow: 0 0 10px #fde047; z-index: 5; }
        .target-ring { position: absolute; left: 50%; top: 50%; width: 48px; height: 48px; transform: translate(-50%, -50%); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1rem; opacity: 0.5; z-index: 4;}
        
        .note { position: absolute; top: 50%; height: var(--note-size); display: flex; align-items: center; justify-content: center; color: white; border-radius: 22px; border: 2px solid white; width: var(--note-size); background: rgba(30, 41, 59, 0.9); z-index: 6; transform: translate3d(0, -50%, 0); will-change: transform;}
        .note.up { border-color: #3b82f6; } .note.left { border-color: #fde047; color: #fde047;} .note.down { border-color: #ef4444; } .note.right { border-color: #ffffff; }
        
        #feedback { position: absolute; top: -7vh; left: 50%; transform: translateX(-50%); font-size: 2.5rem; font-weight: 900; opacity: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.8); pointer-events: none; z-index: 20; }
        
        .mobile-controls { width: 100%; max-width: 500px; display: flex; justify-content: space-around; padding: 0 10px 2vh 10px; z-index: 20;}
        .m-btn { background: rgba(30,41,59,0.8); border: 2px solid white; border-radius: 50%; width: clamp(60px, 16vw, 75px); height: clamp(60px, 16vw, 75px); font-size: 1.8rem; display: flex; justify-content: center; align-items: center; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        .m-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.1); }
        .m-up { border-color: #3b82f6; } .m-left { border-color: #fde047; } .m-down { border-color: #ef4444; } .m-right { border-color: #ffffff; }
        
        .overlay { position: absolute; inset: 0; background: rgba(2,44,34,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; overflow-y: auto; padding: 20px 0;}
        .overlay.active { display: flex; }
        
        .menu-options { display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; margin-top: 15px; }
        .song-btn { background: #d97706; color: white; border: 2px solid #fcd34d; padding: 12px 20px; font-size: 1.2rem; border-radius: 12px; font-weight: bold; cursor: pointer; transition: transform 0.2s; display: flex; flex-direction: column; align-items: center; font-family: 'Outfit', sans-serif;}
        .song-btn span { font-size: 0.85rem; font-weight: normal; color: #fef08a; margin-top: 4px;}
        .song-btn:hover { transform: scale(1.02); background: #b45309; }
        
        /* Difficulty Colors */
        .diff-0 { border-color: #4ade80; } .diff-0 span { color: #86efac; }
        .diff-1 { border-color: #60a5fa; } .diff-1 span { color: #93c5fd; }
        .diff-2 { border-color: #facc15; } .diff-2 span { color: #fef08a; }
        .diff-3 { border-color: #f97316; } .diff-3 span { color: #fdba74; }
        .diff-4 { border-color: #ef4444; } .diff-4 span { color: #fca5a5; }

        .final-score { font-size: 4rem; color: #34d399; font-weight: bold; margin: 10px 0; }
        .replay-btn { background: #d97706; color: white; border: 2px solid #fcd34d; padding: 15px 45px; font-size: 1.5rem; border-radius: 50px; font-weight: bold; cursor: pointer; transition: transform 0.2s; margin-top: 20px; font-family: 'Outfit', sans-serif;}
    </style>
</head>
<body>
    <header><h1>DDU DU DDU DU</h1></header>
    
    <div class="hud">
        <div class="score">Score: <span id="score-val">0</span></div>
        <div class="combo">Combo: <span id="combo-val">0</span>x</div>
    </div>
    <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
    
    <div class="game-area">
        <div class="tinikling-stage">
            <div class="horizontal-bamboo bamboo-back" id="pole-back"></div>
            <div class="dancer-sprite" id="dancer">🧍</div>
            <div class="horizontal-bamboo bamboo-front" id="pole-front"></div>
        </div>
        
        <div id="feedback">PERFECT!</div>
        
        <div class="track-container" id="track">
            <div class="hit-line"></div>
        </div>
        
        <div class="mobile-controls">
            <div class="m-btn m-up" data-key="ArrowUp">⬆️</div>
            <div class="m-btn m-left" data-key="ArrowLeft">⬅️</div>
            <div class="m-btn m-down" data-key="ArrowDown">⬇️</div>
            <div class="m-btn m-right" data-key="ArrowRight">➡️</div>
        </div>
    </div>

    <div class="overlay active" id="start-screen">
        <h1 style="color: #fde047; font-size: 2.5rem; margin-bottom: 5px;">Select Track</h1>
        <p style="color: #a7f3d0; margin-bottom: 10px;">5 Stages of Difficulty... sorry men antok na ko, di ko na inayos</p>
        
        <div class="menu-options">
            <button class="song-btn diff-0" onclick="startGame(0)">1.<span>Easy (100 BPM)</span></button>
            <button class="song-btn diff-1" onclick="startGame(1)">2<span>Normal (115 BPM)</span></button>
            <button class="song-btn diff-2" onclick="startGame(2)">3.<span>Hard (130 BPM)</span>RECOMMENDED</button>
            <button class="song-btn diff-3" onclick="startGame(3)">4.<span>Very Hard (145 BPM)</span></button>
            <button class="song-btn diff-4" onclick="startGame(4)">5.<span>Expert (160 BPM)</span></button>
        </div>
    </div>

    <div class="overlay" id="victory-screen">
        <h1 style="color: #4ade80; font-size: 3rem;">STAGE CLEARED!</h1>
        <div id="vic-song-name" style="font-size: 1.8rem; color: #fcd34d; margin-top: 10px;">Song</div>
        <div class="final-score" id="vic-score">0</div>
        <div style="font-size: 1.4rem; color: #a7f3d0; background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);">
            Hits: <span id="vic-hits" style="color:#34d399; font-weight: bold;">0</span><br>
            Misses: <span id="vic-misses" style="color:#ef4444; font-weight: bold;">0</span>
        </div>
        <button class="replay-btn" onclick="location.reload()">Main Menu</button>
    </div>

    <script>
        let audioCtx, isPlaying = false, score = 0, combo = 0, hits = 0, misses = 0, spawnedCount = 0, processedCount = 0;
        let notes = [], currentSongData = [], noteSpeed = 200, currentSpeedMult = 1.0;
        
        const trackEl = document.getElementById('track'), feedbackEl = document.getElementById('feedback');
        const laneMap = {'ArrowUp':0, 'ArrowLeft':1, 'ArrowDown':2, 'ArrowRight':3}, symbols = ['⬆️','⬅️','⬇️','➡️'], classes = ['up','left','down','right'];
        
        // Frequencies
        const C4=262, D4=294, E4=330, F4=349, G4=392, A4=440, B4=494;
        const C5=523, D5=587, E5=659, F5=698, G5=784, A5=880;

        // Song Builder Helper
        function buildSong(bpm, seq, repeats) {
            let beatDur = 60 / bpm;
            let result = [];
            for(let r=0; r<repeats; r++) {
                seq.forEach(n => result.push({ f: n[0], d: n[1] * beatDur }));
            }
            return result;
        }

        // Sequences [Frequency, Beats]
        const seq1 = [[G4,1],[G4,1],[A4,1],[G4,1],[E5,2],[D5,1],[C5,1]]; // Leron
        const seq2 = [[G4,0.5],[A4,0.5],[G4,0.5],[E4,0.5],[C5,1],[G4,1],[A4,0.5],[B4,0.5],[C5,0.5],[D5,0.5],[E5,2]]; // Sitsiritsit
        const seq3 = [[G4,1],[B4,1],[D5,1],[G4,1],[B4,1],[D5,1],[A4,1],[C5,1],[E5,1],[A4,1],[C5,1],[E5,1]]; // Tinikling
        const seq4 = [[E5,0.5],[D5,0.5],[C5,1],[C5,1],[B4,0.5],[A4,0.5],[G4,1],[G4,1],[F4,0.5],[G4,0.5],[A4,1],[B4,1],[C5,2]]; // Carinosa
        const seq5 = [[C5,0.5],[E5,0.5],[G5,0.5],[E5,0.5],[C5,0.5],[G4,0.5],[C5,0.5],[E5,0.5],[G5,0.5],[E5,0.5],[C5,0.5],[G4,0.5],[D5,0.5],[F5,0.5],[A5,0.5],[F5,0.5],[D5,0.5],[A4,0.5]]; // Pandanggo

        const SONGS = [
            { title: "1", data: buildSong(100, seq1, 6), speedMult: 0.8 },
            { title: "2", data: buildSong(115, seq2, 6), speedMult: 1.0 },
            { title: "3", data: buildSong(130, seq3, 6), speedMult: 1.2 },
            { title: "4", data: buildSong(145, seq4, 5), speedMult: 1.4 },
            { title: "5", data: buildSong(160, seq5, 5), speedMult: 1.4 }
        ];

        function playSound(f) {
            const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.6, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.4);
            osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.4);
        }

        function playMiss() {
            const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.2);
            osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.2);
        }

        function startGame(id) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const song = SONGS[id]; currentSongData = song.data; currentSpeedMult = song.speedMult;
            
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('vic-song-name').innerText = song.title;
            isPlaying = true;
            
            // Setup Lanes dynamically
            trackEl.querySelectorAll('.lane').forEach(e => e.remove());
            for(let i=0; i<4; i++) {
                const l = document.createElement('div'); l.className='lane'; l.id=`lane-${i}`;
                const r = document.createElement('div'); r.className='target-ring'; r.innerText=symbols[i];
                l.appendChild(r); trackEl.appendChild(l);
            }

            // Calculate Base Speed (Half screen traveled in 1.5s, modified by difficulty)
            noteSpeed = ((trackEl.offsetWidth / 2) / 1.5) * currentSpeedMult;
            
            let currentTime = audioCtx.currentTime + 1.5; // Start delay
            currentSongData.forEach((d) => {
                const lane = Math.floor(Math.random()*4);
                const noteEl = document.createElement('div');
                noteEl.className = `note ${classes[lane]}`;
                noteEl.innerHTML = `<span>${symbols[lane]}</span>`;
                document.getElementById(`lane-${lane}`).appendChild(noteEl);
                notes.push({ el: noteEl, time: currentTime, lane, f: d.f, active: true });
                currentTime += d.d; // Advance time by beat duration
            });

            requestAnimationFrame(update);
        }

        function update() {
            if(!isPlaying) return;
            const now = audioCtx.currentTime, hitX = trackEl.offsetWidth / 2;
            notes.forEach((n, i) => {
                if(!n.active) return;
                const visualX = hitX + (n.time - now) * noteSpeed;
                n.el.style.transform = `translate3d(${visualX}px, -50%, 0)`;
                
                // Miss calculation (0.15s past the hit line)
                if(now > n.time + 0.15) { 
                    n.active = false; 
                    n.el.style.opacity = 0; setTimeout(() => n.el.remove(), 200);
                    handleMiss(); 
                }
            });
            requestAnimationFrame(update);
        }

        function trigger(lane) {
            if(!isPlaying) return;
            const now = audioCtx.currentTime;
            
            // Visual ring click feedback
            const ring = document.getElementById(`lane-${lane}`).querySelector('.target-ring');
            ring.style.background = 'rgba(255,255,255,0.3)'; ring.style.transform = 'translate(-50%, -50%) scale(1.2)';
            setTimeout(() => { ring.style.background = 'transparent'; ring.style.transform = 'translate(-50%, -50%) scale(1)'; }, 100);

            // Find closest active note in this lane within 0.15s window
            const n = notes.find(x => x.active && x.lane === lane && Math.abs(x.time - now) < 0.15);
            if(n) {
                n.active = false; 
                n.el.style.transform = `translate3d(${trackEl.offsetWidth / 2}px, -50%, 0) scale(1.5)`;
                n.el.style.opacity = 0; setTimeout(() => n.el.remove(), 200);
                handleHit(n);
            } else {
                handleMiss(true); // Empty tap counts as miss
            }
        }

        function handleHit(n) {
            playSound(n.f); hits++; combo++; score += 100 + (combo*10); processedCount++;
            
            feedbackEl.innerText = "PERFECT!"; feedbackEl.style.color = "#fde047"; 
            feedbackEl.style.opacity = 1; setTimeout(() => feedbackEl.style.opacity = 0, 300);
            
            // Dance Animation
            document.getElementById('dancer').innerText = combo % 2 === 0 ? "🕺" : "🏃";
            document.getElementById('pole-back').style.transform = "translateY(-30px)";
            document.getElementById('pole-front').style.transform = "translateY(30px)";
            setTimeout(() => { document.getElementById('pole-back').style.transform = "translateY(-15px)"; document.getElementById('pole-front').style.transform = "translateY(15px)"; }, 150);
            
            updateHud();
        }

        function handleMiss(isEmptyTap = false) {
            if(!isEmptyTap) playMiss();
            misses++; combo = 0; 
            if(!isEmptyTap) processedCount++;
            
            feedbackEl.innerText = "MISS"; feedbackEl.style.color = "#ef4444"; 
            feedbackEl.style.opacity = 1; setTimeout(() => feedbackEl.style.opacity = 0, 300);
            
            // Trip Animation
            document.getElementById('dancer').innerText = "😵";
            document.getElementById('pole-back').style.transform = "translateY(-10px)";
            document.getElementById('pole-front').style.transform = "translateY(10px)";
            setTimeout(() => { document.getElementById('dancer').innerText = "🧍"; }, 400);

            updateHud();
        }

        function updateHud() {
            document.getElementById('score-val').innerText = score;
            document.getElementById('combo-val').innerText = combo;
            document.getElementById('progress-bar').style.width = (processedCount / currentSongData.length * 100) + "%";
            if(processedCount >= currentSongData.length) setTimeout(endGame, 1000);
        }

        function endGame() {
            isPlaying = false;
            document.getElementById('victory-screen').classList.add('active');
            document.getElementById('vic-score').innerText = score;
            document.getElementById('vic-hits').innerText = hits;
            document.getElementById('vic-misses').innerText = misses;
        }

        // Inputs
        window.addEventListener('keydown', e => { if(!e.repeat && laneMap[e.key] !== undefined) trigger(laneMap[e.key]); });
        document.querySelectorAll('.m-btn').forEach(b => {
            b.addEventListener('pointerdown', e => { e.preventDefault(); trigger(laneMap[b.dataset.key]); });
        });
    </script>
</body>
</html>
