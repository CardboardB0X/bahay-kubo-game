<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythm Tinikling</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --track-height: 240px;
            --lane-height: 60px;
            --note-size: 44px;
            --stage-scale: clamp(0.5, 2vw, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        
        body {
            background: linear-gradient(135deg, #0f172a, #020617, #0f172a);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden; display: flex; flex-direction: column; align-items: center;
            user-select: none; -webkit-user-select: none;
        }

        header { text-align: center; padding: 1vh 10px; z-index: 30; }
        h1 { color: #fde047; text-shadow: 0 2px 10px rgba(253, 224, 71, 0.4); font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 900; }
        
        .hud {
            display: flex; justify-content: space-between; align-items: center;
            width: 95%; max-width: 900px; font-size: 1.1rem; font-weight: bold;
            z-index: 30; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); margin-top: 5px;
        }
        .score { color: #34d399; }
        .combo { color: #fbbf24; }

        .progress-container {
            width: 95%; max-width: 900px; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 3px; margin-top: 8px; overflow: hidden; z-index: 30;
        }
        .progress-bar { height: 100%; width: 0%; background: #38bdf8; transition: width 0.3s linear; }

        .game-area { flex: 1; width: 100%; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; position: relative; }

        /* --- TINIKLING STAGE --- */
        .tinikling-stage {
            position: relative; width: 100%; max-width: 400px; height: 20vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 5; transform: scale(var(--stage-scale)); margin-top: 1vh;
        }
        .horizontal-bamboo {
            position: absolute; width: 120%; height: 20px;
            background: repeating-linear-gradient(to right, #d97706, #fcd34d 40px, #d97706 80px, #78350f 85px);
            border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bamboo-back { z-index: 4; transform: translateY(-20px); filter: brightness(0.7); }
        .dancer-sprite { z-index: 5; font-size: 5rem; position: absolute; transition: transform 0.1s ease; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); }
        .bamboo-front { z-index: 6; transform: translateY(20px); }

        /* --- KARAOKE UI --- */
        .karaoke-box {
            width: 95%; max-width: 800px; text-align: center;
            font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 900;
            background: rgba(0, 0, 0, 0.7); padding: 12px 20px; border-radius: 15px;
            border: 2px solid #a7f3d0; margin: 1.5vh 0; z-index: 10;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); min-height: 70px;
            display: flex; justify-content: center; align-items: center; flex-wrap: wrap;
            transition: opacity 0.3s;
        }
        .karaoke-box.hidden { opacity: 0; pointer-events: none; }
        .syl { color: rgba(255, 255, 255, 0.25); transition: color 0.1s, text-shadow 0.1s; white-space: pre; }
        .syl.hit { color: #fde047; text-shadow: 0 0 15px #fde047; }
        .syl.miss { color: #ef4444; opacity: 0.5; }

        /* --- 4-LANE TRACK --- */
        .track-container {
            position: relative; width: 95%; max-width: 1000px; height: var(--track-height);
            background: rgba(15, 23, 42, 0.95); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px; z-index: 15; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); margin-top: auto; margin-bottom: 2vh;
            display: flex; flex-direction: column;
        }
        .lane { flex: 1; position: relative; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .lane:last-child { border-bottom: none; }
        
        .hit-line {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 4px;
            transform: translateX(-50%); background: #fde047; box-shadow: 0 0 15px #fde047; z-index: 5;
        }
        
        .target-ring {
            position: absolute; left: 50%; top: 50%; width: 48px; height: 48px;
            transform: translate(-50%, -50%); border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; z-index: 4; display: flex; justify-content: center; align-items: center; font-size: 1rem; opacity: 0.5;
        }

        /* Notes */
        .note {
            position: absolute; top: 50%; left: 0; height: var(--note-size);
            display: flex; align-items: center; z-index: 6; color: white;
            transform: translate3d(0, -50%, 0); will-change: transform; border-radius: 22px;
            border: 2px solid white;
        }

        .note.tap { width: var(--note-size); justify-content: center; background: rgba(30, 41, 59, 0.9); }
        .note.hold { justify-content: flex-start; background: linear-gradient(90deg, rgba(255,255,255,0.6), rgba(255,255,255,0.1)); padding-left: 4px; }

        .note.up { border-color: #3b82f6; } 
        .note.left { border-color: #fde047; color: #fde047; } 
        .note.down { border-color: #ef4444; } 
        .note.right { border-color: #ffffff; } 

        #feedback {
            position: absolute; top: -7vh; left: 50%; transform: translateX(-50%);
            font-size: 2.5rem; font-weight: 900; opacity: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.8); z-index: 20; pointer-events: none;
        }

        /* Controls */
        .mobile-controls {
            width: 100%; max-width: 500px; display: flex; justify-content: space-around;
            padding: 0 10px 2vh 10px; z-index: 20;
        }
        .m-btn {
            background: rgba(30, 41, 59, 0.8); border: 2px solid; border-radius: 50%;
            width: 70px; height: 70px; font-size: 1.8rem; display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .m-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.1); }
        .m-up { border-color: #3b82f6; } .m-left { border-color: #fde047; } .m-down { border-color: #ef4444; } .m-right { border-color: #ffffff; }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 44, 34, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center; display: none;
        }
        .overlay.active { display: flex; }
        .overlay h1 { font-size: 3rem; margin-bottom: 10px; color: #fde047; }
        .final-score { font-size: 4rem; color: #34d399; font-weight: bold; margin: 10px 0; }

        .menu-options {
            display: flex; flex-direction: column; gap: 15px; margin-top: 20px; width: 90%; max-width: 400px;
        }

        .song-btn {
            background: #d97706; color: white; border: 2px solid #fcd34d; padding: 15px 20px; font-size: 1.3rem; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: transform 0.2s, background 0.2s; display: flex; flex-direction: column; align-items: center;
        }
        .song-btn span { font-size: 0.9rem; font-weight: normal; color: #fef08a; margin-top: 5px;}
        .song-btn:hover { transform: scale(1.05); background: #b45309; }

        .replay-btn {
            background: #d97706; color: white; border: 2px solid #fcd34d; padding: 15px 45px; font-size: 1.5rem; border-radius: 50px;
            font-weight: bold; cursor: pointer; transition: transform 0.2s; margin-top: 20px;
        }
        .replay-btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

    <header><h1>FILIPINO RHYTHM</h1></header>

    <div class="hud">
        <div class="score">Energy: <span id="score-val">0</span></div>
        <div class="combo">Combo: <span id="combo-val">0</span>x</div>
    </div>
    
    <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>

    <div class="game-area">
        <div class="tinikling-stage">
            <div class="horizontal-bamboo bamboo-back" id="pole-back"></div>
            <div class="dancer-sprite" id="dancer">🧍</div>
            <div class="horizontal-bamboo bamboo-front" id="pole-front"></div>
        </div>

        <div class="karaoke-box hidden" id="karaoke-box"></div>
        <div id="feedback">PERFECT!</div>

        <div class="track-container" id="track">
            <div class="hit-line"></div>
        </div>

        <div class="mobile-controls">
            <div class="m-btn m-up" data-key="ArrowUp">⬆️</div>
            <div class="m-btn m-left" data-key="ArrowLeft">⬅️</div>
            <div class="m-btn m-down" data-key="ArrowDown">⬇️</div>
            <div class="m-btn m-right" data-key="ArrowRight">➡️</div>
        </div>
    </div>

    <div class="overlay active" id="start-screen">
        <h1>Rhythm & Dance</h1>
        <p style="color: #a7f3d0; margin-bottom: 10px; font-size: 1.2rem;">Choose your song!</p>
        
        <div class="menu-options">
            <button class="song-btn" onclick="startGame('instrumental')">
                Instrumental Tinikling
                <span>Fast-paced steady rhythm (No Lyrics)</span>
            </button>
            <button class="song-btn" onclick="startGame('bahayKubo')">
                Bahay Kubo
                <span>Karaoke Mode with Hold Notes</span>
                <br>
                <span>Sorry talaga na hindi tugma sa pitch, minadali ko na dahil antok na ko men</span>
            </button>
        </div>
    </div>

    <div class="overlay" id="victory-screen">
        <h1 style="color: #4ade80;">RESULTS!!!</h1>
        <div id="vic-song-name" style="font-size: 1.8rem; color: #fcd34d; margin-bottom: 10px;">Song Name</div>
        <div class="final-score" id="vic-score">0</div>
        
        <div style="font-size: 1.4rem; color: #a7f3d0; margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);">
            Correct Hits: <span id="vic-hits" style="color:#34d399; font-weight: bold;">0</span><br>
            Misses: <span id="vic-misses" style="color:#ef4444; font-weight: bold;">0</span>
        </div>

        <button class="replay-btn" onclick="resetGame()">Main Menu</button>
    </div>

    <script>
        // --- Web Audio Synthesizer ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        const C4=261.63, D4=293.66, E4=329.63, F4=349.23, G4=392.00, A4=440.00, B4=493.88, C5=523.25, D5=587.33, E5=659.25, F5=698.46, G5=783.99;
        const Q = 500, E = 250, H = 1000;

        // Song 1: Instrumental Folk Melody Data
        const folkMelodyRaw = [
            392.00, 329.63, 261.63, 392.00, 329.63, 261.63,
            349.23, 293.66, 246.94, 349.23, 293.66, 246.94,
            329.63, 349.23, 392.00, 523.25, 392.00, 261.63
        ];
        const instrumentalData = [];
        for(let i=0; i<3; i++) {
            folkMelodyRaw.forEach(freq => { instrumentalData.push({ freq: freq, delay: 450, type: 'tap' }); });
        }

        // Song 2: Bahay Kubo Karaoke Data
        const bkLyricsLines = [
            [ {s:"Ba-", f:G4, d:Q, t:'tap'}, {s:"hay ", f:C5, d:Q, t:'tap'}, {s:"ku-", f:C5, d:Q, t:'tap'}, {s:"bo, ", f:C5, d:H, t:'hold'}, {s:"ka-", f:C5, d:Q, t:'tap'}, {s:"hit ", f:D5, d:Q, t:'tap'}, {s:"mun-", f:C5, d:Q, t:'tap'}, {s:"ti, ", f:B4, d:H, t:'hold'} ],
            [ {s:"Ang ", f:A4, d:Q, t:'tap'}, {s:"ha-", f:G4, d:E, t:'tap'}, {s:"la-", f:A4, d:E, t:'tap'}, {s:"man ", f:G4, d:Q, t:'tap'}, {s:"do-", f:F4, d:H, t:'hold'}, {s:"on ", f:E4, d:Q, t:'tap'}, {s:"ay ", f:F4, d:Q, t:'tap'}, {s:"sa-", f:G4, d:E, t:'tap'}, {s:"ri-", f:G4, d:E, t:'tap'}, {s:"sa-", f:C5, d:Q, t:'tap'}, {s:"ri. ", f:C5, d:H, t:'hold'} ],
            [ {s:"Sing-", f:C5, d:Q, t:'tap'}, {s:"ka-", f:D5, d:Q, t:'tap'}, {s:"mas ", f:E5, d:Q, t:'tap'}, {s:"at ", f:F5, d:H, t:'hold'}, {s:"ta-", f:G5, d:Q, t:'tap'}, {s:"long, ", f:G5, d:H, t:'hold'}, {s:"si-", f:G5, d:Q, t:'tap'}, {s:"ga-", f:G5, d:E, t:'tap'}, {s:"ril-", f:F5, d:E, t:'tap'}, {s:"lyas ", f:E5, d:Q, t:'tap'}, {s:"at ", f:D5, d:Q, t:'tap'}, {s:"ma-", f:C5, d:Q, t:'tap'}, {s:"ni. ", f:C5, d:H, t:'hold'} ],
            [ {s:"Si-", f:G4, d:Q, t:'tap'}, {s:"taw, ", f:C5, d:H, t:'hold'}, {s:"ba-", f:C5, d:Q, t:'tap'}, {s:"taw, ", f:C5, d:H, t:'hold'}, {s:"pa-", f:C5, d:Q, t:'tap'}, {s:"ta-", f:D5, d:Q, t:'tap'}, {s:"ni. ", f:C5, d:H, t:'hold'} ],
            [ {s:"Kun-", f:G4, d:Q, t:'tap'}, {s:"dol, ", f:C5, d:Q, t:'tap'}, {s:"pa-", f:C5, d:Q, t:'tap'}, {s:"to-", f:C5, d:H, t:'hold'}, {s:"la, ", f:C5, d:Q, t:'tap'}, {s:"u-", f:C5, d:Q, t:'tap'}, {s:"po't ", f:D5, d:E, t:'tap'}, {s:"ka-", f:C5, d:E, t:'tap'}, {s:"la-", f:B4, d:Q, t:'tap'}, {s:"ba-", f:A4, d:H, t:'hold'}, {s:"sa, ", f:G4, d:H, t:'hold'} ],
            [ {s:"At ", f:A4, d:Q, t:'tap'}, {s:"tsa-", f:G4, d:E, t:'tap'}, {s:"ka ", f:A4, d:E, t:'tap'}, {s:"may-", f:G4, d:Q, t:'tap'}, {s:"ron ", f:F4, d:Q, t:'tap'}, {s:"pang ", f:E4, d:Q, t:'tap'}, {s:"la-", f:F4, d:E, t:'tap'}, {s:"ba-", f:G4, d:E, t:'tap'}, {s:"nos, ", f:G4, d:Q, t:'tap'}, {s:"mus-", f:C5, d:Q, t:'tap'}, {s:"ta-", f:C5, d:Q, t:'tap'}, {s:"sa, ", f:C5, d:H, t:'hold'} ],
            [ {s:"Si-", f:C5, d:Q, t:'tap'}, {s:"bu-", f:D5, d:Q, t:'tap'}, {s:"yas, ", f:E5, d:Q, t:'tap'}, {s:"ka-", f:F5, d:Q, t:'tap'}, {s:"ma-", f:G5, d:Q, t:'tap'}, {s:"tis, ", f:G5, d:Q, t:'tap'}, {s:"ba-", f:G5, d:Q, t:'tap'}, {s:"wang ", f:F5, d:Q, t:'tap'}, {s:"at ", f:E5, d:Q, t:'tap'}, {s:"lu-", f:D5, d:H, t:'hold'}, {s:"ya, ", f:C5, d:H, t:'hold'} ],
            [ {s:"Sa ", f:G4, d:Q, t:'tap'}, {s:"pa-", f:C5, d:Q, t:'tap'}, {s:"li-", f:C5, d:Q, t:'tap'}, {s:"gid-", f:C5, d:E, t:'tap'}, {s:"li-", f:D5, d:E, t:'tap'}, {s:"gid ", f:C5, d:Q, t:'tap'}, {s:"ay ", f:B4, d:Q, t:'tap'}, {s:"pu-", f:A4, d:E, t:'tap'}, {s:"no ", f:G4, d:E, t:'tap'}, {s:"ng ", f:F4, d:Q, t:'tap'}, {s:"lin-", f:E4, d:H, t:'hold'}, {s:"ga.", f:C4, d:H, t:'hold'} ]
        ];

        const bahayKuboData = [];
        bkLyricsLines.forEach((line, lIdx) => line.forEach((syl, sIndex) => bahayKuboData.push({ text: syl.s, freq: syl.f, delay: syl.d, type: syl.t, lineIdx: lIdx, sylIdx: sIndex })));

        const SONGS = {
            'instrumental': { title: 'Instrumental Tinikling', hasLyrics: false, data: instrumentalData },
            'bahayKubo': { title: 'Bahay Kubo', hasLyrics: true, lyricsLines: bkLyricsLines, data: bahayKuboData }
        };

        let currentSongKey = '';
        let flatSong = [];

        function playSound(type, freq = 400) {
            if (!audioCtx) return;
            const time = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            if (type === 'hit') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, time);
                gain.gain.setValueAtTime(0.6, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.4);
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, time);
                gain.gain.setValueAtTime(0.3, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
            }
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(time + 0.4);
        }

        const trackEl = document.getElementById('track'), scoreEl = document.getElementById('score-val'), comboEl = document.getElementById('combo-val'), progressBar = document.getElementById('progress-bar'), feedbackEl = document.getElementById('feedback'), karaokeBox = document.getElementById('karaoke-box'), dancerEl = document.getElementById('dancer'), poleBack = document.getElementById('pole-back'), poleFront = document.getElementById('pole-front');
        
        let score = 0, combo = 0, isPlaying = false, notes = [], hitX, spawnX, noteSpeed, hitTolerance;
        let notesSpawned = 0, notesProcessed = 0, spawnTimer, currentRenderedLine = -1, tiniklingBeat = 0;
        
        // Track Hit & Misses
        let totalHits = 0, totalMisses = 0;

        const laneMap = {'ArrowUp':0, 'ArrowLeft':1, 'ArrowDown':2, 'ArrowRight':3}, keysArray = Object.keys(laneMap);
        const laneSymbols = ['⬆️', '⬅️', '⬇️', '➡️'], laneClasses = ['up', 'left', 'down', 'right'];

        function setupLanes() {
            for(let i=0; i<4; i++) {
                const lane = document.createElement('div'); lane.className='lane'; lane.id=`lane-${i}`;
                const ring = document.createElement('div'); ring.className='target-ring'; ring.innerText=laneSymbols[i];
                lane.appendChild(ring); trackEl.appendChild(lane);
            }
        }
        setupLanes();

        function updateDimensions() {
            hitX = trackEl.offsetWidth / 2; spawnX = trackEl.offsetWidth + 80;
            noteSpeed = (trackEl.offsetWidth / 2) / 1.5; hitTolerance = 60;
        }

        function renderKaraokeLine(lineIdx) {
            if (!SONGS[currentSongKey].hasLyrics) return;
            if (currentRenderedLine === lineIdx) return;
            karaokeBox.innerHTML = '';
            SONGS[currentSongKey].lyricsLines[lineIdx].forEach((syl, idx) => {
                const span = document.createElement('span'); span.className = 'syl'; span.id = `syl-${lineIdx}-${idx}`; span.innerText = syl.s;
                karaokeBox.appendChild(span);
            });
            currentRenderedLine = lineIdx;
        }

        function highlightSyllable(lineIdx, sylIdx, status) {
            if (!SONGS[currentSongKey].hasLyrics) return;
            renderKaraokeLine(lineIdx);
            const sylEl = document.getElementById(`syl-${lineIdx}-${sylIdx}`);
            if (sylEl) sylEl.classList.add(status);
        }

        function spawnNote() {
            if (!isPlaying || notesSpawned >= flatSong.length) return;
            const key = keysArray[Math.floor(Math.random()*4)], songData = flatSong[notesSpawned], laneIdx = laneMap[key];
            const noteEl = document.createElement('div'); noteEl.className = `note ${songData.type} ${laneClasses[laneIdx]}`;
            noteEl.innerHTML = `<span>${laneSymbols[laneIdx]}</span>`;
            let noteWidth = 44;
            if (songData.type === 'hold') {
                noteWidth = Math.max((songData.delay/1000)*noteSpeed*0.8, 90);
                noteEl.style.width = `${noteWidth}px`;
            }
            document.getElementById(`lane-${laneIdx}`).appendChild(noteEl);
            notes.push({ el: noteEl, x: spawnX, width: noteWidth, key, type: songData.type, active: true, holding: false, songData });
            notesSpawned++;
            spawnTimer = setTimeout(spawnNote, songData.delay);
        }

        function gameLoop(currentTime) {
            if (!isPlaying) return;
            const deltaTime = (currentTime - (window.lastTime || currentTime)) / 1000;
            window.lastTime = currentTime;
            for (let i = notes.length - 1; i >= 0; i--) {
                let n = notes[i];
                if (n.active) {
                    n.x -= noteSpeed * deltaTime;
                    n.el.style.transform = `translate3d(${n.x}px, -50%, 0)`;
                    if (n.type === 'tap' && n.x < hitX - hitTolerance - 20) {
                        n.active = false; handleMiss(n); notes.splice(i, 1);
                    } else if (n.type === 'hold') {
                        if (!n.holding && n.x < hitX - hitTolerance - 20) {
                            n.active = false; handleMiss(n); notes.splice(i, 1);
                        } else if (n.holding && (n.x + n.width) < hitX) {
                            n.active = false; handleHit('PERFECT', n); notes.splice(i, 1);
                        }
                    }
                }
            }
            if (notesProcessed >= flatSong.length) { setTimeout(endGame, 1000); return; }
            requestAnimationFrame(gameLoop);
        }

        function triggerDown(key) {
            if (!isPlaying) return;
            const laneNotes = notes.filter(n => n.active && n.key === key);
            const headNote = laneNotes.find(n => Math.abs(n.x - hitX) <= hitTolerance);
            if (headNote) {
                if (headNote.type === 'tap') { 
                    headNote.active = false; notes.splice(notes.indexOf(headNote), 1); handleHit('PERFECT', headNote); 
                }
                else { 
                    headNote.holding = true; 
                    playSound('hit', headNote.songData.freq); 
                    if(SONGS[currentSongKey].hasLyrics) highlightSyllable(headNote.songData.lineIdx, headNote.songData.sylIdx, 'hit'); 
                }
            } else handleMiss(null);
        }

        function triggerUp(key) {
            const holdNote = notes.find(n => n.active && n.key === key && n.type === 'hold' && n.holding);
            if (holdNote) {
                holdNote.active = false; notes.splice(notes.indexOf(holdNote), 1);
                if (Math.abs((holdNote.x + holdNote.width) - hitX) <= hitTolerance * 1.5) handleHit('PERFECT', holdNote);
                else handleMiss(holdNote);
            }
        }

        window.addEventListener('keydown', (e) => { if(!e.repeat && keysArray.includes(e.key)) { e.preventDefault(); triggerDown(e.key); } });
        window.addEventListener('keyup', (e) => { if(keysArray.includes(e.key)) triggerUp(e.key); });
        document.querySelectorAll('.m-btn').forEach(btn => {
            btn.addEventListener('pointerdown', (e) => { e.preventDefault(); triggerDown(btn.dataset.key); });
            btn.addEventListener('pointerup', (e) => { e.preventDefault(); triggerUp(btn.dataset.key); });
            btn.addEventListener('pointercancel', (e) => { e.preventDefault(); triggerUp(btn.dataset.key); });
        });

        function handleHit(type, n) {
            if(n.type !== 'hold' || !n.holding) { 
                playSound('hit', n.songData.freq); 
                if(SONGS[currentSongKey].hasLyrics) highlightSyllable(n.songData.lineIdx, n.songData.sylIdx, 'hit'); 
            }
            notesProcessed++; 
            totalHits++; // Track stat
            score += 100 + (combo*10); combo++; updateHUD();
            
            feedbackEl.innerText = type; feedbackEl.style.opacity = 1; setTimeout(() => feedbackEl.style.opacity = 0, 300);
            n.el.style.opacity = 0; setTimeout(() => n.el.remove(), 200);
            
            tiniklingBeat = (tiniklingBeat + 1) % 3;
            if (tiniklingBeat === 0) { poleBack.style.transform = 'translateY(-10px)'; poleFront.style.transform = 'translateY(10px)'; dancerEl.innerText = '🕴️'; dancerEl.style.transform = 'translateY(-40px)'; }
            else { poleBack.style.transform = 'translateY(-35px)'; poleFront.style.transform = 'translateY(35px)'; dancerEl.innerText = '🏃'; dancerEl.style.transform = `translateX(${tiniklingBeat===1?-15:15}px)`; }
        }

        function handleMiss(n) {
            playSound('miss'); 
            combo = 0; 
            totalMisses++; // Track stat
            updateHUD();
            
            feedbackEl.innerText = "MISS"; feedbackEl.style.color = "#ef4444"; feedbackEl.style.opacity = 1; setTimeout(() => feedbackEl.style.opacity = 0, 300);
            if (n) { 
                notesProcessed++; 
                if(SONGS[currentSongKey].hasLyrics) highlightSyllable(n.songData.lineIdx, n.songData.sylIdx, 'miss'); 
                n.el.style.opacity = 0; setTimeout(() => n.el.remove(), 200); 
            }
            dancerEl.innerText = '😵'; setTimeout(() => dancerEl.innerText = '🧍', 400);
        }

        function updateHUD() { scoreEl.innerText = score; comboEl.innerText = combo; progressBar.style.width = `${(notesProcessed/flatSong.length)*100}%`; }
        
        function endGame() { 
            isPlaying = false; 
            
            // Populate the Result Screen Stats
            document.getElementById('vic-song-name').innerText = SONGS[currentSongKey].title;
            document.getElementById('vic-score').innerText = score; 
            document.getElementById('vic-hits').innerText = totalHits;
            document.getElementById('vic-misses').innerText = totalMisses;
            
            document.getElementById('victory-screen').classList.add('active'); 
        }
        
        function resetGame() { location.reload(); }
        
        function startGame(songId) { 
            initAudio(); 
            currentSongKey = songId;
            flatSong = SONGS[currentSongKey].data;

            if (SONGS[currentSongKey].hasLyrics) {
                karaokeBox.classList.remove('hidden');
                renderKaraokeLine(0);
            } else {
                karaokeBox.classList.add('hidden');
            }

            document.getElementById('start-screen').classList.remove('active'); 
            updateDimensions(); 
            
            isPlaying = true; score = 0; combo = 0; totalHits = 0; totalMisses = 0;
            notesSpawned = 0; notesProcessed = 0; currentRenderedLine = -1; tiniklingBeat = 0; notes = [];
            
            scoreEl.innerText = score; comboEl.innerText = combo; progressBar.style.width = "0%";
            setTimeout(() => { window.lastTime = performance.now(); gameLoop(window.lastTime); spawnNote(); }, 1000); 
        }
    </script>
</body>
</html>
